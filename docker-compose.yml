services:
  # ---------------------------------------------------------
  # Redis: Acts as the central message broker and metadata database
  # - db=0 is used by Celery for task routing and results
  # - db=1 is used by the API to store task execution history
  # ---------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------
  # API: The Flask backend running via Gunicorn
  # Handles all incoming REST requests and streams SSE events
  # ---------------------------------------------------------
  api:
    build: 
      context: .
      dockerfile: Dockerfile
    command: gunicorn -k geventwebsocket.gunicorn.workers.GeventWebSocketWorker -w 1 run:app
    ports:
      - "5000:5000"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  # ---------------------------------------------------------
  # Worker: The Celery consumer
  # Listens to the Redis broker and executes tasks in the background
  # ---------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A make_celery worker --loglevel=info
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  # ---------------------------------------------------------
  # Frontend: Next.js Telemetry Console
  # Serves the real-time React dashboard
  # ---------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - api

  # ---------------------------------------------------------
  # Locust: Load Testing Framework
  # Simulates high traffic (POST/GET) to stress test the API and Queue
  # ---------------------------------------------------------
  locust:
    image: locustio/locust
    ports:
      - "8089:8089"
    volumes:
      - ./load_tests:/mnt/locust
    command: -f /mnt/locust/locustfile.py
    environment:
      - LOCUST_HOST=http://api:5000
    depends_on:
      - api

  # ---------------------------------------------------------
  # Flower: Celery Monitoring Dashboard
  # Provides administrative insight into worker nodes and task history
  # ---------------------------------------------------------
  flower:
    build: 
      context: .
      dockerfile: Dockerfile
    command: celery -A make_celery flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
